<!DOCTYPE html>
<html lang="pt-BR">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>Focus Trip | Ranking</title>
 <link rel="stylesheet" href="style.css" />
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="app-page">
 <aside class="sidebar">
 <div class="sidebar-logo"><span class="logo-icon"></span><span class="logo-text">Focus<span class="logo-accent">Trip</span></span></div>
 <nav class="sidebar-nav">
 <a href="dashboard.html" class="nav-item"><span class="nav-icon"></span><span>Dashboard</span></a>
 <a href="sessao.html" class="nav-item"><span class="nav-icon"></span><span>Sessão de Estudo</span></a>
 <a href="agenda.html" class="nav-item"><span class="nav-icon"></span><span>Minha Agenda</span></a>
 <a href="perfil.html" class="nav-item"><span class="nav-icon"></span><span>Perfil</span></a>
 <a href="ranking.html" class="nav-item active"><span class="nav-icon"></span><span>Ranking</span></a>
 </nav>
 </aside>

 <main class="app-main">
 <header class="app-topbar">
 <div class="topbar-greeting">Ranking</div>
 <div class="topbar-right">
 <div class="topbar-streak" id="topStreak">0 dias</div>
 </div>
 </header>

 <div class="app-content">

 <!-- ABAS DO RANKING -->
 <div class="ranking-tabs">
 <button class="tab-btn active" onclick="showRanking('semanal', this)">Semanal</button>
 <button class="tab-btn" onclick="showRanking('mensal', this)">Mensal</button>
 <button class="tab-btn" onclick="showRanking('streak', this)">Streak</button>
 </div>

 <!-- PÓDIO TOP 3 -->
 <div class="podium" id="podium"></div>

 <!-- LISTA COMPLETA -->
 <div class="ranking-list-header">
 <span>Posição</span><span>Estudante</span><span>Streak</span><span>Horas</span>
 </div>
 <div class="ranking-list" id="rankingList"></div>

 <!-- COMPARTILHAR -->
 <div class="share-card">
 <div class="share-icon"></div>
 <div>
 <strong>Mostre seu nível para os amigos!</strong>
 <p>Copie seu link de perfil e desafie quem você conhece.</p>
 </div>
 <button class="btn-primary" onclick="copyShareLink()">Copiar link</button>
 </div>

 </div>
 </main>

 <script src="app.js?v=db4"></script>
 <script>let currentRankType = 'semanal';

 document.addEventListener('DOMContentLoaded', () => {
 const user = getUser();
 if (!user) { window.location.href = 'login.html'; return; }
 document.getElementById('topStreak').textContent = `${user.streak} dias`;
 showRanking('semanal', document.querySelector('.tab-btn.active'));
 });

 function showRanking(type, btn) {
 currentRankType = type;
 document.querySelectorAll('.ranking-tabs .tab-btn').forEach(b =>b.classList.remove('active'));
 btn.classList.add('active');
 renderRanking(type);
 }

 function getRankingData(type) {
 const user = getUser();
 const sessions = JSON.parse(localStorage.getItem('focustrip_sessions') || '[]');
 const today = new Date();

 let startDate;
 if (type === 'semanal') {
 startDate = new Date(today); startDate.setDate(today.getDate() - 7);
 } else if (type === 'mensal') {
 startDate = new Date(today.getFullYear(), today.getMonth(), 1);
 }

 const myMinutes = type === 'streak' ? user.streak :
 sessions.filter(s => !startDate || new Date(s.data) >= startDate)
 .reduce((a,s) =>a+(s.duracao||0), 0);

 // Dados simulados de outros usuários
 const fakeUsers = [
 { nome: 'Ana Lima', streak: 21, horas: 180, avatar: '' },
 { nome: 'Pedro Costa', streak: 14, horas: 140, avatar: '' },
 { nome: 'Julia Souza', streak: 9, horas: 95, avatar: '' },
 { nome: 'Lucas Melo', streak: 7, horas: 80, avatar: '' },
 { nome: 'Mariana Rios', streak: 5, horas: 60, avatar: '' },
 { nome: 'Felipe Borges', streak: 3, horas: 45, avatar: '' },
 { nome: 'Clara Nunes', streak: 2, horas: 30, avatar: '' },
 ];

 const myEntry = {
 nome: user.nome.split(' ')[0],
 streak: user.streak,
 horas: Math.round(myMinutes / (type === 'streak' ? 1 : 1)),
 avatar: '',
 isMe: true,
 value: type === 'streak' ? user.streak : myMinutes
 };

 const allUsers = [
 ...fakeUsers.map(u => ({
 ...u,
 value: type === 'streak' ? u.streak : (type === 'mensal' ? u.horas * 5 : u.horas)
 })),
 myEntry
 ].sort((a, b) =>b.value - a.value);

 return allUsers;
 }

 function renderRanking(type) {
 const data = getRankingData(type);
 const valueLabel = type === 'streak' ? 'dias' : 'min';

 // Pódio (top 3)
 const top3 = data.slice(0, 3);
 const podiumOrder = [1, 0, 2]; // 2º, 1º, 3º para o visual
 const medals = ['1º','2º','3º'];
 const heights = ['cal-podium-2nd','cal-podium-1st','cal-podium-3rd'];

 document.getElementById('podium').innerHTML = `
 <div class="podium-inner">
 ${podiumOrder.map(idx => {
 const p = top3[idx];
 if (!p) return '<div class="podium-slot empty"></div>';
 return `
 <div class="podium-slot ${heights[idx]} ${p.isMe ? 'podium-me' : ''}">
 <div class="podium-avatar">${p.avatar}</div>
 <div class="podium-medal">${medals[idx]}</div>
 <div class="podium-name">${p.nome}</div>
 <div class="podium-value">${p.value} ${valueLabel}</div>
 <div class="podium-block podium-block-${idx+1}"></div>
 </div>
 `;
 }).join('')}
 </div>
 `;

 // Lista completa
 document.getElementById('rankingList').innerHTML = data.map((p, i) => `
 <div class="rank-row ${p.isMe ? 'rank-row-me' : ''}">
 <span class="rank-position">${i < 3 ? medals[i] : (i+1)+'º'}</span>
 <div class="rank-user">
 <span class="rank-avatar">${p.avatar}</span>
 <span class="rank-name">${p.nome}${p.isMe ? ' <span class="you-tag">você</span>' : ''}</span>
 </div>
 <span class="rank-streak-col">${p.streak}</span>
 <span class="rank-value">${p.value} ${valueLabel}</span>
 </div>
 `).join('');
 }

 function copyShareLink() {
 const user = getUser();
 const text = `Olha meu progresso no Focus Trip! Estou com ${user.streak} dias de streak e ${user.xp} XP! Venha estudar comigo focustrip.app`;
 navigator.clipboard.writeText(text).then(() =>showToast('Link copiado! Cole e compartilhe com seus amigos'));
 }
 </script>
</body>
</html>

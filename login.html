<!DOCTYPE html>
<html lang="pt-BR">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>Focus Trip | Entrar</title>
 <link rel="stylesheet" href="style.css" />
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="auth-page">
 <div class="auth-container auth-container-slim">
  <div class="auth-right auth-right-full">
   <div class="auth-form-wrapper">
    <a href="index.html" class="auth-logo auth-logo-centered">
     <span class="logo-icon"></span>
     <span class="logo-text">Focus<span class="logo-accent">Trip</span></span>
    </a>

    <h1 class="auth-title">Bem-vindo de volta</h1>
    <p class="auth-subtitle">Não tem conta? <a href="cadastro.html">Criar grátis</a></p>

    <form class="auth-form" id="formLogin" onsubmit="handleLogin(event)">
     <div class="form-group">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com" required />
     </div>

     <div class="form-group">
      <label for="senha">Senha</label>
      <div class="input-with-icon">
       <input type="password" id="senha" placeholder="Sua senha" required />
       <button type="button" class="toggle-password" onclick="togglePass('senha')">Mostrar</button>
      </div>
     </div>

     <div id="login-error" class="auth-error" style="display:none">E-mail ou senha incorretos.</div>
     <button type="submit" class="btn-primary btn-full btn-lg">Entrar na minha conta</button>
     <div class="auth-divider"><span>ou</span></div>
     <a href="cadastro.html" class="btn-ghost btn-full">Criar nova conta</a>
    </form>
   </div>
  </div>
 </div>

 <script src="app.js?v=db8"></script>
 <script>
 function togglePass(id) {
  const input = document.getElementById(id);
  input.type = input.type === 'password' ? 'text' : 'password';
 }

 async function handleLogin(e) {
  e.preventDefault();
  try {
   await loginAccount(document.getElementById('email').value, document.getElementById('senha').value);
   window.location.href = 'dashboard.html';
  } catch (error) {
   document.getElementById('login-error').style.display = 'block';
  }
 }
 </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>Focus Trip | Minha Agenda</title>
 <link rel="stylesheet" href="style.css?v=agenda2" />
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="app-page">
 <aside class="sidebar">
 <div class="sidebar-logo"><span class="logo-icon"></span><span class="logo-text">Focus<span class="logo-accent">Trip</span></span></div>
 <nav class="sidebar-nav">
 <a href="dashboard.html" class="nav-item"><span class="nav-icon"></span><span>Dashboard</span></a>
 <a href="sessao.html" class="nav-item"><span class="nav-icon"></span><span>Sessão de Estudo</span></a>
 <a href="agenda.html" class="nav-item active"><span class="nav-icon"></span><span>Minha Agenda</span></a>
 <a href="perfil.html" class="nav-item"><span class="nav-icon"></span><span>Perfil</span></a>
 </nav>
 </aside>

 <main class="app-main">
 <header class="app-topbar">
 <div class="topbar-greeting">Minha Agenda</div>
 <div class="topbar-right">
 <div class="topbar-streak" id="topStreak">0 dias</div>
 </div>
 </header>

 <div class="app-content">

 <!-- CABEÇALHO DO MÊS -->
 <div class="calendar-header">
 <button class="cal-nav-btn" id="btnPrevMonth" onclick="changeMonth(-1)">&lsaquo;</button>
 <h2 class="cal-month-title" id="calTitle">Maio 2026</h2>
 <button class="cal-nav-btn" id="btnNextMonth" onclick="changeMonth(1)">&rsaquo;</button>
 </div>

 <!-- LEGENDA -->
 <div class="cal-legend">
 <span class="legend-dot dot-study"></span>Dia de estudo
 <span class="legend-dot dot-done"></span>Meta cumprida
 <span class="legend-dot dot-partial"></span>Parcial
 <span class="legend-dot dot-missed"></span>Perdido
 <span class="legend-dot dot-rest"></span>Descanso
 </div>

 <!-- CALENDÁRIO -->
 <div class="calendar-grid" id="calendarGrid"></div>

 <!-- RESUMO DO MÊS -->
 <div class="month-summary" id="monthSummary"></div>

 <!-- MATERIAS AGENDADAS -->
 <div class="section-title">Matérias desta semana</div>
 <div class="subjects-week" id="subjectsWeek"></div>

 <!-- ADICIONAR MATERIA -->
 <div class="add-subject-card">
 <h3>Adicionar matéria - semana</h3>
 <div class="add-subject-form">
 <input type="text" id="subjectName" class="input-styled" placeholder="Nome da matéria (ex: Física)" />
 <div class="schedule-fields">
 <div class="form-group compact">
 <label for="subjectTime">Horário</label>
 <input type="time" id="subjectTime" class="input-styled" value="08:00" />
 </div>
 <div class="form-group compact">
 <label for="subjectDuration">Estudo</label>
 <select id="subjectDuration" class="input-styled">
 <option value="25">25 min</option>
 <option value="45">45 min</option>
 <option value="60" selected>1h</option>
 <option value="90">1h 30min</option>
 <option value="120">2h</option>
 </select>
 </div>
 <div class="form-group compact">
 <label for="subjectBreak">Descanso</label>
 <select id="subjectBreak" class="input-styled">
 <option value="5">5 min</option>
 <option value="10" selected>10 min</option>
 <option value="15">15 min</option>
 <option value="20">20 min</option>
 <option value="30">30 min</option>
 </select>
 </div>
 </div>
 <div class="days-selector" id="subjectDays">
 <button type="button" class="day-btn" data-day="seg">Seg</button>
 <button type="button" class="day-btn" data-day="ter">Ter</button>
 <button type="button" class="day-btn" data-day="qua">Qua</button>
 <button type="button" class="day-btn" data-day="qui">Qui</button>
 <button type="button" class="day-btn" data-day="sex">Sex</button>
 <button type="button" class="day-btn" data-day="sab">Sáb</button>
 <button type="button" class="day-btn" data-day="dom">Dom</button>
 </div>
 <button class="btn-primary" onclick="addSubject()">Adicionar</button>
 </div>
 </div>

 </div>
 </main>

 <script src="app.js?v=db9"></script>
 <script>let viewYear, viewMonth;

 document.addEventListener('DOMContentLoaded', async () => {
 let user = getUser();
 if (!user) { window.location.href = 'login.html'; return; }
 user = await refreshAccount().catch(() => user) || user;
 document.getElementById('topStreak').textContent = `${user.streak} dias`;

 const now = new Date();
 viewYear = now.getFullYear();
 viewMonth = now.getMonth();

 document.querySelectorAll('#subjectDays .day-btn').forEach(btn =>btn.addEventListener('click', () =>btn.classList.toggle('active'))
 );

 if (isPremiumUser(user)) renderCalendar();
 else renderCalendarLocked();
 renderSubjectsWeek();
 });

 function changeMonth(delta) {
 viewMonth += delta;
 if (viewMonth > 11) { viewMonth = 0; viewYear++; }
 if (viewMonth < 0) { viewMonth = 11; viewYear--; }
 if (!isPremiumUser()) return;
 renderCalendar();
 }

function renderCalendar() {
 const user = getUser();
 const sessions = JSON.parse(localStorage.getItem('focustrip_sessions') || '[]');
 const subjects = JSON.parse(localStorage.getItem('focustrip_subjects') || '[]');
 const dayKeys = ['dom','seg','ter','qua','qui','sex','sab'];
 const monthNames = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
 'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

 document.getElementById('calTitle').textContent = `${monthNames[viewMonth]} ${viewYear}`;

 const firstDay = new Date(viewYear, viewMonth, 1).getDay();
 const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
 const today = localDateKey();
 const metaMins = (user.horas || 2) * 60;

 let html = '<div class="cal-week-headers"><span>Dom</span><span>Seg</span><span>Ter</span><span>Qua</span><span>Qui</span><span>Sex</span><span>Sáb</span></div><div class="cal-days">';

 for (let i = 0; i < firstDay; i++) html += '<div class="cal-day cal-empty"></div>';

 for (let d = 1; d <= daysInMonth; d++) {
 const dateStr = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
 const dayOfWeek = new Date(viewYear, viewMonth, d).getDay();
 const dayKey = dayKeys[dayOfWeek];
 const dayPlan = subjects
 .filter(s =>(s.dias || []).includes(dayKey))
 .sort((a, b) =>(a.horario || '08:00').localeCompare(b.horario || '08:00'));
 const ehEstudo = (user.dias || []).includes(dayKey) || dayPlan.length > 0;
 const daySessions = sessions.filter(s =>s.data === dateStr);
 const mins = daySessions.reduce((a,s) =>a+(s.duracao||0), 0);
 const isFuture = dateStr >today;
 const isToday = dateStr === today;

 let cls = 'cal-day';
 let icon = '';
 if (isToday) cls += ' cal-today';
 if (!ehEstudo && !isToday) { cls += ' cal-rest'; icon = ''; }
 else if (isFuture && ehEstudo) { cls += ' cal-future'; icon = ''; }
 else if (ehEstudo && mins >= metaMins) { cls += ' cal-done'; icon = ''; }
 else if (ehEstudo && mins > 0) { cls += ' cal-partial'; icon = ''; }
 else if (ehEstudo && !isFuture) { cls += ' cal-missed'; icon = ''; }

 html += `
 <div class="${cls}" title="${buildDayTitle(dayPlan, mins)}">
 <span class="cal-day-num">${d}</span>
 <span class="cal-day-icon">${icon}</span>
 ${dayPlan.length ? `
 <span class="cal-day-plan">
 <strong>${dayPlan[0].horario || '08:00'}</strong>
 <small>${dayPlan[0].nome}</small>
 ${dayPlan.length > 1 ? `<em>+${dayPlan.length - 1}</em>` : ''}
 </span>` : ''}
 ${mins > 0 ? `<span class="cal-day-mins">${mins}m</span>` : ''}
 </div>
 `;
 }

 html += '</div>';
 document.getElementById('calendarGrid').innerHTML = html;

 // Resumo do mês
 const monthSessions = sessions.filter(s =>s.data.startsWith(`${viewYear}-${String(viewMonth+1).padStart(2,'0')}`));
 const totalMins = monthSessions.reduce((a,s) =>a+(s.duracao||0), 0);
 const metasDias = Array.from({length: daysInMonth}, (_,i) => {
 const dateStr = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(i+1).padStart(2,'0')}`;
 const dayOfWeek = new Date(viewYear, viewMonth, i+1).getDay();
 const dayKey = dayKeys[dayOfWeek];
 const hasPlan = subjects.some(s =>(s.dias || []).includes(dayKey));
 return ((user.dias||[]).includes(dayKey) || hasPlan) && dateStr <= today ? dateStr : null;
 }).filter(Boolean);
 const cumpriu = metasDias.filter(d => {
 const m = sessions.filter(s =>s.data === d).reduce((a,s) =>a+(s.duracao||0), 0);
 return m >= metaMins;
 });

 document.getElementById('monthSummary').innerHTML = `
 <div class="summary-stat"><span></span><strong>${minToHour(totalMins)}</strong><small>Estudadas no mês</small></div>
 <div class="summary-stat"><span></span><strong>${cumpriu.length}/${metasDias.length}</strong><small>Metas cumpridas</small></div>
 <div class="summary-stat"><span></span><strong>${metasDias.length > 0 ? Math.round((cumpriu.length/metasDias.length)*100) : 0}%</strong><small>Taxa de consistência</small></div>
 <div class="summary-stat"><span></span><strong>${user.streak}</strong><small>Streak atual</small></div>
 `;
 }

 function renderCalendarLocked() {
 document.querySelector('.calendar-header').style.display = 'none';
 document.querySelector('.cal-legend').style.display = 'none';
 document.getElementById('calendarGrid').innerHTML = `
 <div class="upgrade-card">
 <strong>Calendario completo no Premium</strong>
 <p>No plano gratuito voce pode adicionar ate 2 materias por dia. Calendario mensal, metas do mes e acompanhamento completo ficam liberados no Premium.</p>
 </div>
 `;
 document.getElementById('monthSummary').innerHTML = '';
 }

 function buildDayTitle(plan, mins) {
 const studied = mins > 0 ? `${mins}min estudados` : 'Sem estudo registrado';
 if (!plan.length) return studied;
 const agenda = plan.map(s =>`${s.horario || '08:00'} - ${s.nome}: ${minToHour(Number(s.duracao || 60))} + ${s.pausa || 10}min descanso`).join(' | ');
 return `${agenda} | ${studied}`;
 }

 function normalizeSubject(subject) {
 return {
 ...subject,
 horario: subject.horario || '08:00',
 duracao: Number(subject.duracao || 60),
 pausa: Number(subject.pausa || 10)
 };
 }

 function renderSubjectsWeek() {
 const subjects = JSON.parse(localStorage.getItem('focustrip_subjects') || '[]').map(normalizeSubject);
 const container = document.getElementById('subjectsWeek');
 if (!subjects.length) {
 container.innerHTML = '<div class="empty-state">Nenhuma matéria cadastrada. Adicione abaixo! </div>';
 return;
 }
 const dayLabels = { seg:'Seg', ter:'Ter', qua:'Qua', qui:'Qui', sex:'Sex', sab:'Sáb', dom:'Dom' };
 container.innerHTML = subjects.map((s, i) => `
 <div class="subject-card">
 <div class="subject-color" style="background:${s.color}"></div>
 <div class="subject-info">
 <strong>${s.nome}</strong>
 <div class="subject-schedule">${s.horario} - ${minToHour(s.duracao)} de estudo - ${s.pausa}min de descanso</div>
 <div class="subject-days">${s.dias.map(d => `<span class="day-chip">${dayLabels[d]}</span>`).join('')}</div>
 </div>
 <button class="btn-icon-del" onclick="removeSubject(${i})" title="Remover"></button>
 </div>
 `).join('');
 }

 async function addSubject() {
 const nome = document.getElementById('subjectName').value.trim();
 if (!nome) { showToast('Digite o nome da materia!'); return; }
 const dias = [...document.querySelectorAll('#subjectDays .day-btn.active')].map(b =>b.dataset.day);
 if (!dias.length) { showToast('Selecione pelo menos um dia!'); return; }
 const horario = document.getElementById('subjectTime').value || '08:00';
 const duracao = Number(document.getElementById('subjectDuration').value || 60);
 const pausa = Number(document.getElementById('subjectBreak').value || 10);
 const colors = ['#6366f1','#ec4899','#f59e0b','#10b981','#3b82f6','#8b5cf6','#ef4444'];
 const subjects = JSON.parse(localStorage.getItem('focustrip_subjects') || '[]');
 const subject = { nome, dias, horario, duracao, pausa, color: colors[subjects.length % colors.length] };
 try {
 const saved = await persistSubject(subject);
 if (!saved) return;
 subjects.push(saved);
 localStorage.setItem('focustrip_subjects', JSON.stringify(subjects));
 renderSubjectsWeek();
 if (isPremiumUser()) renderCalendar();
 } catch (error) {
 showToast(error.message);
 return;
 }
 document.getElementById('subjectName').value = '';
 document.getElementById('subjectTime').value = '08:00';
 document.getElementById('subjectDuration').value = '60';
 document.getElementById('subjectBreak').value = '10';
 document.querySelectorAll('#subjectDays .day-btn').forEach(b =>b.classList.remove('active'));
 showToast('Materia adicionada!');
 }

 function removeSubject(i) {
 const subjects = JSON.parse(localStorage.getItem('focustrip_subjects') || '[]');
 const [removed] = subjects.splice(i, 1);
 localStorage.setItem('focustrip_subjects', JSON.stringify(subjects));
 deleteSubjectFromServer(removed && removed.id).catch(() => {});
 renderSubjectsWeek();
 if (isPremiumUser()) renderCalendar();
 }
 </script>
</body>
</html>

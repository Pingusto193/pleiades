<!DOCTYPE html>
<html lang="pt-BR">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>Focus Trip | Meu Perfil</title>
 <link rel="icon" type="image/svg+xml" href="favicon.svg" />
 <link rel="stylesheet" href="style.css?v=stats-charts1" />
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="app-page">
 <aside class="sidebar">
 <div class="sidebar-logo"><span class="logo-icon"></span><span class="logo-text">Focus<span class="logo-accent">Trip</span></span></div>
 <nav class="sidebar-nav">
 <a href="dashboard.html" class="nav-item"><span class="nav-icon"></span><span>Dashboard</span></a>
 <a href="sessao.html" class="nav-item"><span class="nav-icon"></span><span>Sessão de Estudo</span></a>
 <a href="agenda.html" class="nav-item"><span class="nav-icon"></span><span>Minha Agenda</span></a>
 <a href="perfil.html" class="nav-item active"><span class="nav-icon"></span><span>Perfil</span></a>
 </nav>
 </aside>

 <main class="app-main">
 <header class="app-topbar">
 <div class="topbar-greeting">Meu Perfil</div>
 <div class="topbar-right">
 <div class="topbar-streak" id="topStreak">0 dias</div>
 </div>
 </header>
 <div class="app-content">

 <!-- PERFIL CARD -->
 <div class="profile-hero-card" id="profileHero"></div>

 <!-- ABAS -->
 <div class="profile-tabs">
 <button class="tab-btn active" onclick="showTab('conquistas', this)">Conquistas</button>
 <button class="tab-btn" onclick="showTab('historico', this)">Histórico</button>
 <button class="tab-btn" onclick="showTab('estatisticas', this)">Estatisticas</button>
 <button class="tab-btn" onclick="showTab('conta', this)">Conta</button>
 <button class="tab-btn" onclick="showTab('configuracoes', this)">Configurações</button>
 </div>

 <!-- ABA CONQUISTAS -->
 <div class="tab-content" id="tab-conquistas">
 <div class="achievements-full-grid" id="achievementsFull"></div>
 </div>

 <!-- ABA HISTÓRICO -->
 <div class="tab-content" id="tab-historico" style="display:none">
 <div class="history-list" id="historyList"></div>
 </div>

 <!-- ABA ESTATISTICAS -->
 <div class="tab-content" id="tab-estatisticas" style="display:none">
 <div id="statsPanel"></div>
 </div>

 <!-- ABA CONTA -->
 <div class="tab-content" id="tab-conta" style="display:none">
 <div class="settings-card">
 <h3>Detalhes da Conta</h3>
 <div class="form-group">
 <label for="accountName">Nome</label>
 <input type="text" id="accountName" class="input-styled" />
 </div>
 <div class="form-group">
 <label for="accountEmail">E-mail</label>
 <input type="email" id="accountEmail" class="input-styled" />
 </div>
 <div class="form-group">
 <label for="currentPassword">Senha atual</label>
 <input type="password" id="currentPassword" class="input-styled" placeholder="Obrigatória apenas para trocar a senha" />
 </div>
 <div class="form-group">
 <label for="newPassword">Nova senha</label>
 <input type="password" id="newPassword" class="input-styled" placeholder="Mínimo 8 caracteres" />
 </div>
 <button class="btn-primary" onclick="saveAccountDetails()">Salvar detalhes da conta</button>
 </div>
 </div>

 <!-- ABA CONFIGURACOES -->
 <div class="tab-content" id="tab-configuracoes" style="display:none">
 <div class="settings-card">
 <h3>Aparência</h3>
 <div class="form-group">
  <div class="theme-toggle-row">
   <div>
    <span class="theme-label">Modo escuro</span>
    <small class="theme-desc">Alterna entre tema claro e escuro em todas as páginas</small>
   </div>
   <label class="switch-toggle">
    <input type="checkbox" id="darkModeToggle" />
    <span class="switch-slider"></span>
   </label>
  </div>
 </div>
 <h3>Foto de Perfil</h3>
 <div class="form-group">
 <label>Foto de perfil</label>
 <input type="file" id="avatarInput" class="input-styled" accept="image/png,image/jpeg,image/webp,image/gif" />
 <button class="btn-ghost" onclick="saveAvatar()">Enviar foto</button>
 </div>
 <h3>Configurações de Estudo</h3>
 <div class="form-group">
 <label>Horas de estudo por dia</label>
 <div class="hours-selector" id="settingsHours"></div>
 </div>
 <div class="form-group">
 <label>Dias de estudo</label>
 <div class="days-selector" id="settingsDays"></div>
 </div>
 <div class="form-group">
 <label>Método preferido</label>
 <div class="method-selector" id="settingsMethod"></div>
 </div>
 <button class="btn-primary" onclick="saveSettings()">Salvar configurações</button>
 </div>
 </div>

 </div>
 </main>

 <script src="app.js?v=db9"></script>
 <script>document.addEventListener('DOMContentLoaded', async () => {
 let user = getUser();
 if (!user) { window.location.href = 'login.html'; return; }
 user = await refreshAccount().catch(() => user) || user;
 document.getElementById('topStreak').textContent = `${user.streak} dias`;

 // Profile hero
 const sessions = JSON.parse(localStorage.getItem('focustrip_sessions') || '[]');
 const totalMins = sessions.reduce((a,s) =>a+(s.duracao||0), 0);
 const nextLevelXP = user.nivel * 500;
 const currentLevelXP = (user.nivel - 1) * 500;
 const xpPct = Math.min(100, Math.round(((user.xp - currentLevelXP) / 500) * 100));

 document.getElementById('profileHero').innerHTML = `
 <div class="profile-hero-left">
 <div class="profile-avatar-big has-avatar"><img src="${userAvatarUrl(user)}" alt="Foto de perfil" /></div>
 <div class="profile-hero-info">
 <h2>${user.nome}</h2>
 <div class="profile-email">${user.email}</div>
 <div class="profile-streak-big"> ${user.streak} dias em sequência</div>
 <div class="profile-badges-row">
 ${getAchievements().filter(a => (user.conquistas||[]).includes(a.id) || checkAchievement(a, user))
 .slice(0,5).map(a => `<span class="badge-icon-big" title="${a.nome}">${a.icon}</span>`).join('') || '<span class="no-badges">Sem conquistas ainda</span>'}
 </div>
 </div>
 </div>
 <div class="profile-hero-right">
 <div class="profile-level-card">
 <div class="level-label-big">Nível ${user.nivel}</div>
 <div class="level-name">${getLevelName(user.nivel)}</div>
 <div class="level-bar-big"><div class="level-fill-big" style="width:${xpPct}%"></div></div>
 <div class="level-xp">${user.xp} / ${nextLevelXP} XP</div>
 </div>
 <div class="profile-quick-stats">
 <div class="quick-stat"><span></span><strong>${minToHour(totalMins)}</strong><small>Total estudado</small></div>
 <div class="quick-stat"><span></span><strong>${sessions.length}</strong><small>Sessões</small></div>
 <div class="quick-stat"><span></span><strong>${(user.conquistas||[]).length}</strong><small>Conquistas</small></div>
 </div>
 </div>
 `;

 // Conquistas
 renderAchievementsFull(user);

 // Histórico
 renderHistory(sessions);
 renderStatsPanel(sessions);

 // Configurações
 renderAccount(user);
 renderSettings(user);
 renderPlanLocks(user);

 // Ativa transição na aba inicial
 requestAnimationFrame(() => requestAnimationFrame(() =>
  document.getElementById('tab-conquistas').classList.add('tab-visible')
 ));
 });

 function renderAchievementsFull(user) {
 const all = getAchievements();
 document.getElementById('achievementsFull').innerHTML = all.map(a => {
 const unlocked = (user.conquistas||[]).includes(a.id) || checkAchievement(a, user);
 return `
 <div class="ach-full-card ${unlocked ? 'unlocked' : 'locked'}">
 <div class="ach-full-icon">${unlocked ? a.icon : ''}</div>
 <div class="ach-full-name">${a.nome}</div>
 <div class="ach-full-desc">${a.desc}</div>
 <div class="ach-full-status">${unlocked ? ' Conquistado' : 'Bloqueado'}</div>
 </div>
 `;
 }).join('');
 }

 function renderHistory(sessions) {
 if (!sessions.length) {
 document.getElementById('historyList').innerHTML = '<div class="empty-state">Nenhuma sessão registrada ainda.</div>';
 return;
 }
 const sorted = [...sessions].reverse();
 document.getElementById('historyList').innerHTML = sorted.map(s => `
 <div class="history-item">
 <div class="history-date">${formatDate(s.data)}</div>
 <div class="history-subject">${s.materia || 'Sessão de estudo'}</div>
 <div class="history-method">${s.metodo || 'pomodoro'}</div>
 <div class="history-duration">${s.duracao}min</div>
 <div class="history-status ${s.completa ? 'done' : 'partial'}">${s.completa ? ' Completa' : ' Parcial'}</div>
 </div>
 `).join('');
 }

 function renderStatsPanel(sessions) {
 const panel = document.getElementById('statsPanel');
 if (!sessions.length) {
 panel.innerHTML = `
 <div class="stats-empty-card">
 <h3>Sem estatisticas ainda</h3>
 <p>Quando voce finalizar suas sessoes de estudo, este painel vai mostrar materias, consistencia, dias e horarios mais usados.</p>
 <a href="sessao.html" class="btn-primary">Comecar uma sessao</a>
 </div>
 `;
 return;
 }

 const cleanSessions = sessions.map(normalizeSession).filter(s => s.duracao > 0);
 if (!cleanSessions.length) {
 panel.innerHTML = `
 <div class="stats-empty-card">
 <h3>Sem tempo de estudo registrado</h3>
 <p>Finalize uma sessão para começar a acompanhar seu tempo, matérias e hábitos de estudo.</p>
 <a href="sessao.html" class="btn-primary">Começar uma sessão</a>
 </div>
 `;
 return;
 }
 const totalMins = cleanSessions.reduce((sum, s) => sum + s.duracao, 0);
 const studyDays = new Set(cleanSessions.map(s => s.data).filter(Boolean));
 const avgPerDay = studyDays.size ? Math.round(totalMins / studyDays.size) : 0;
 const subjectRows = buildSubjectStats(cleanSessions);
 const hourRows = buildHourStats(cleanSessions);
 const methodRows = buildMethodStats(cleanSessions);
 const trendRows = buildDailyTrend(cleanSessions);
 const completedSessions = cleanSessions.filter(s => s.completa).length;
 const completionRate = Math.round((completedSessions / cleanSessions.length) * 100);
 const bestHour = hourRows.find(row => row.key !== 'sem-hora');
 const topSubject = subjectRows[0];
 const recentTrend = trendRows.slice(-7);

 panel.innerHTML = `
 <section class="stats-simple-intro">
 <h3>Seu estudo em números</h3>
 <p>Veja rapidamente quanto você estudou e quais hábitos aparecem na sua rotina.</p>
 </section>

 <section class="stats-simple-summary">
 <article class="stats-simple-card">
 <span>Tempo estudado</span>
 <strong>${minToHour(totalMins)}</strong>
 <small>em ${cleanSessions.length} sessões</small>
 </article>
 <article class="stats-simple-card">
 <span>Dias com estudo</span>
 <strong>${studyDays.size}</strong>
 <small>média de ${avgPerDay} min por dia</small>
 </article>
 <article class="stats-simple-card">
 <span>Sessões concluídas</span>
 <strong>${completedSessions} de ${cleanSessions.length}</strong>
 <small>${completionRate}% foram até o fim</small>
 </article>
 <article class="stats-simple-card highlight">
 <span>Matéria mais estudada</span>
 <strong>${escapeHtml(topSubject?.label || 'Sem dados')}</strong>
 <small>${topSubject ? minToHour(topSubject.minutes) : 'Continue estudando'}</small>
 </article>
 </section>

 <section class="stats-section-card stats-quick-read">
 <div class="stats-section-head">
 <div>
 <h3>Resumo rápido</h3>
 <p>O que seus estudos mostram até agora.</p>
 </div>
 </div>
 <div class="stats-insight-list">
 <div class="stats-insight"><strong>Você costuma estudar mais às ${bestHour ? bestHour.label : 'horário ainda não identificado'}.</strong><span>${bestHour ? `${bestHour.sessions} sessões registradas nesse horário.` : 'Continue estudando para descobrir seu melhor horário.'}</span></div>
 <div class="stats-insight"><strong>Em um dia de estudo, você estuda cerca de ${avgPerDay} minutos.</strong><span>Essa média considera apenas os dias em que houve alguma sessão.</span></div>
 <div class="stats-insight"><strong>${completionRate}% das suas sessões foram concluídas.</strong><span>${completedSessions} sessões chegaram até o final.</span></div>
 </div>
 </section>

 <section class="stats-section-card">
 <div class="stats-section-head">
 <div>
 <h3>Como seu tempo é dividido</h3>
 <p>Veja quanto do seu estudo foi dedicado a cada matéria.</p>
 </div>
 </div>
 <div class="stats-subject-charts">
 <div class="stats-pie-panel">
 ${renderSubjectPie(subjectRows, totalMins)}
 </div>
 <div class="stats-bars-panel">
 ${renderSubjectBars(subjectRows)}
 </div>
 </div>
 </section>

 <section class="stats-section-card">
 <div class="stats-section-head">
 <div>
 <h3>Últimos 7 dias</h3>
 <p>Quanto tempo você estudou em cada dia.</p>
 </div>
 </div>
 <div class="stats-week-bars">
 ${renderSimpleWeekBars(recentTrend)}
 </div>
 </section>

 <section class="stats-section-card">
 <div class="stats-section-head">
 <div>
 <h3>Estudo por matéria</h3>
 <p>Compare o tempo dedicado a cada matéria.</p>
 </div>
 </div>
 <div class="stats-subject-list">
 ${subjectRows.map(row => `
 <article class="stats-subject-card">
 <div>
 <strong>${escapeHtml(row.label)}</strong>
 <span>${row.sessions} sessões em ${row.days} dias</span>
 </div>
 <div class="stats-subject-result">
 <strong>${minToHour(row.minutes)}</strong>
 <span>${row.completion}% concluídas</span>
 </div>
 </article>
 `).join('')}
 </div>
 </section>

 <div class="stats-two-columns">
 <section class="stats-section-card">
 <div class="stats-section-head">
 <div>
 <h3>Horários mais usados</h3>
 <p>Quando você mais inicia suas sessões.</p>
 </div>
 </div>
 <div class="mini-rank-list">
 ${hourRows.map(row => `
 <div class="mini-rank-item">
 <div><strong>${row.label}</strong><small>${row.sessions} sessoes</small></div>
 <span>${minToHour(row.minutes)}</span>
 </div>
 `).join('')}
 </div>
 </section>

 <section class="stats-section-card">
 <div class="stats-section-head">
 <div>
 <h3>Métodos de estudo</h3>
 <p>Os formatos que você mais usa.</p>
 </div>
 </div>
 <div class="mini-rank-list">
 ${methodRows.map(row => `
 <div class="mini-rank-item">
 <div><strong>${escapeHtml(row.label)}</strong><small>${row.sessions} sessoes</small></div>
 <span>${minToHour(row.minutes)}</span>
 </div>
 `).join('')}
 </div>
 </section>
 </div>
 `;
 }

 function buildDailyTrend(sessions) {
 const today = new Date();
 const days = [];
 for (let i = 13; i >= 0; i--) {
 const date = new Date(today);
 date.setDate(today.getDate() - i);
 const key = date.toISOString().slice(0, 10);
 days.push({ date: key, minutes: 0, sessions: 0 });
 }
 const byDate = new Map(days.map(day => [day.date, day]));
 sessions.forEach(session => {
 if (!byDate.has(session.data)) return;
 const row = byDate.get(session.data);
 row.minutes += session.duracao;
 row.sessions += 1;
 });
 return days;
 }

 function renderSimpleWeekBars(days) {
 const maxMinutes = Math.max(...days.map(day => day.minutes), 1);
 return days.map(day => {
 const date = new Date(day.date + 'T12:00:00');
 const label = date.toLocaleDateString('pt-BR', { weekday: 'short' }).replace('.', '');
 const height = day.minutes ? Math.max(12, Math.round((day.minutes / maxMinutes) * 100)) : 4;
 return `
 <div class="stats-week-day">
 <span>${day.minutes ? minToHour(day.minutes) : '0 min'}</span>
 <div class="stats-week-bar-track"><div class="stats-week-bar" style="height:${height}%"></div></div>
 <strong>${label}</strong>
 </div>
 `;
 }).join('');
 }

 function renderSubjectPie(rows, totalMinutes) {
 const colors = getSubjectChartColors();
 let current = 0;
 const stops = rows.map((row, index) => {
 const start = current;
 current += (row.minutes / totalMinutes) * 100;
 return `${colors[index % colors.length]} ${start.toFixed(2)}% ${current.toFixed(2)}%`;
 }).join(', ');

 return `
 <div class="stats-pie-chart" style="background:conic-gradient(${stops})">
 <div class="stats-pie-center"><strong>${minToHour(totalMinutes)}</strong><span>total</span></div>
 </div>
 <div class="stats-chart-legend">
 ${rows.map((row, index) => {
 const percent = Math.round((row.minutes / totalMinutes) * 100);
 return `
 <div class="stats-legend-item">
 <i style="background:${colors[index % colors.length]}"></i>
 <span>${escapeHtml(row.label)}</span>
 <strong>${percent}%</strong>
 </div>
 `;
 }).join('')}
 </div>
 `;
 }

 function renderSubjectBars(rows) {
 const colors = getSubjectChartColors();
 const maxMinutes = Math.max(...rows.map(row => row.minutes), 1);
 return `
 <div class="stats-chart-title">Tempo por matéria</div>
 <div class="stats-horizontal-bars">
 ${rows.map((row, index) => {
 const width = Math.max(4, Math.round((row.minutes / maxMinutes) * 100));
 return `
 <div class="stats-horizontal-bar">
 <div class="stats-horizontal-bar-head"><strong>${escapeHtml(row.label)}</strong><span>${minToHour(row.minutes)}</span></div>
 <div class="stats-horizontal-bar-track"><div class="stats-horizontal-bar-fill" style="width:${width}%;background:${colors[index % colors.length]}"></div></div>
 </div>
 `;
 }).join('')}
 </div>
 `;
 }

 function getSubjectChartColors() {
 return ['#2f6f73', '#b35f2a', '#7c5c9e', '#2f7d54', '#c28b2c', '#4f78a8', '#b44f62', '#6f7d3b', '#8b6546', '#397f8f'];
 }

 function renderSparkline(values, tone = 'blue') {
 const points = buildChartPoints(values, 136, 42, 8);
 const colorMap = { blue: '#38bdf8', green: '#34d399', cyan: '#06b6d4', orange: '#f59e0b' };
 const color = colorMap[tone] || colorMap.blue;
 return `<svg class="metric-sparkline" viewBox="0 0 136 42" aria-hidden="true">
 <polyline points="${points}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></polyline>
 </svg>`;
 }

 function renderAreaChart(values) {
 const points = buildChartPoints(values, 320, 150, 12);
 return `<svg class="analytics-area-chart" viewBox="0 0 320 150" aria-hidden="true">
 <defs><linearGradient id="studyArea" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#38bdf8" stop-opacity=".34"/><stop offset="1" stop-color="#38bdf8" stop-opacity=".04"/></linearGradient></defs>
 <polygon points="0,150 ${points} 320,150" fill="url(#studyArea)"></polygon>
 <polyline points="${points}" fill="none" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></polyline>
 </svg>`;
 }

 function buildChartPoints(values, width, height, pad) {
 const clean = values.length ? values : [0];
 const max = Math.max(...clean, 1);
 const step = clean.length > 1 ? (width - pad * 2) / (clean.length - 1) : 0;
 return clean.map((value, index) => {
 const x = pad + index * step;
 const y = height - pad - ((value / max) * (height - pad * 2));
 return `${x.toFixed(1)},${y.toFixed(1)}`;
 }).join(' ');
 }

 function renderMiniRing(percent) {
 const safePercent = Math.max(0, Math.min(100, Number(percent) || 0));
 const circumference = 88;
 const dash = (safePercent / 100) * circumference;
 return `<svg class="mini-ring" viewBox="0 0 36 36" aria-hidden="true">
 <circle cx="18" cy="18" r="14" pathLength="88"></circle>
 <circle cx="18" cy="18" r="14" pathLength="88" stroke-dasharray="${dash} ${circumference - dash}"></circle>
 </svg>`;
 }

 function normalizeSession(session) {
 return {
 data: session.data || '',
 duracao: Number(session.duracao) || 0,
 materia: (session.materia || 'Sessao de estudo').trim() || 'Sessao de estudo',
 metodo: (session.metodo || 'pomodoro').trim() || 'pomodoro',
 completa: Boolean(session.completa),
 criadoEm: session.criadoEm || session.criado_em || session.createdAt || ''
 };
 }

 function buildSubjectStats(sessions) {
 const groups = new Map();
 sessions.forEach(session => {
 const key = session.materia.toLowerCase();
 if (!groups.has(key)) {
 groups.set(key, { label: session.materia, sessions: 0, minutes: 0, complete: 0, daysSet: new Set(), dates: [], methods: new Map() });
 }
 const group = groups.get(key);
 group.sessions += 1;
 group.minutes += session.duracao;
 group.complete += session.completa ? 1 : 0;
 if (session.data) {
 group.daysSet.add(session.data);
 group.dates.push(session.data);
 }
 group.methods.set(session.metodo, (group.methods.get(session.metodo) || 0) + 1);
 });

 return [...groups.values()].map(group => {
 const dates = group.dates.sort();
 const first = dates[0];
 const last = dates[dates.length - 1];
 const periodDays = first && last ? daysBetween(first, last) + 1 : group.daysSet.size || 1;
 const consistency = Math.min(100, Math.round((group.daysSet.size / Math.max(1, periodDays)) * 100));
 const bestMethod = [...group.methods.entries()].sort((a, b) => b[1] - a[1])[0]?.[0] || 'pomodoro';
 return {
 label: group.label,
 sessions: group.sessions,
 minutes: group.minutes,
 days: group.daysSet.size,
 lastDate: last ? formatDate(last) : 'Sem data',
 consistency,
 completion: Math.round((group.complete / group.sessions) * 100),
 bestMethod
 };
 }).sort((a, b) => b.minutes - a.minutes);
 }

 function buildHourStats(sessions) {
 const groups = new Map();
 sessions.forEach(session => {
 const hour = getSessionHour(session);
 const key = hour === null ? 'sem-hora' : String(hour).padStart(2, '0');
 const label = hour === null ? 'Sem horario registrado' : `${String(hour).padStart(2, '0')}:00`;
 if (!groups.has(key)) groups.set(key, { key, label, sessions: 0, minutes: 0 });
 const group = groups.get(key);
 group.sessions += 1;
 group.minutes += session.duracao;
 });
 return [...groups.values()].sort((a, b) => b.minutes - a.minutes).slice(0, 6);
 }

 function buildMethodStats(sessions) {
 const groups = new Map();
 sessions.forEach(session => {
 const key = session.metodo.toLowerCase();
 if (!groups.has(key)) groups.set(key, { label: session.metodo, sessions: 0, minutes: 0 });
 const group = groups.get(key);
 group.sessions += 1;
 group.minutes += session.duracao;
 });
 return [...groups.values()].sort((a, b) => b.minutes - a.minutes);
 }

 function getSessionHour(session) {
 if (!session.criadoEm) return null;
 const date = new Date(session.criadoEm);
 return Number.isNaN(date.getTime()) ? null : date.getHours();
 }

 function daysBetween(start, end) {
 const startDate = new Date(start + 'T12:00:00');
 const endDate = new Date(end + 'T12:00:00');
 return Math.round((endDate - startDate) / 86400000);
 }

 function escapeHtml(value) {
 return String(value || '').replace(/[&<>"']/g, char => ({
 '&': '&amp;',
 '<': '&lt;',
 '>': '&gt;',
 '"': '&quot;',
 "'": '&#039;'
 }[char]));
 }

 function renderSettings(user) {
 const toggle = document.getElementById('darkModeToggle');
 toggle.checked = (localStorage.getItem('ft_theme') || 'light') === 'dark';
 toggle.addEventListener('change', function() {
  setTheme(this.checked ? 'dark' : 'light');
 });

 const hours = [1,2,3,4,6];
 document.getElementById('settingsHours').innerHTML = hours.map(h =>
 `<button type="button" class="hours-btn ${user.horas===h?'active':''}" data-hours="${h}" onclick="selectHours(${h}, this)">${h}h</button>`
 ).join('');

 const days = [['seg','Seg'],['ter','Ter'],['qua','Qua'],['qui','Qui'],['sex','Sex'],['sab','Sáb'],['dom','Dom']];
 document.getElementById('settingsDays').innerHTML = days.map(([k,l]) =>
 `<button type="button" class="day-btn ${(user.dias||[]).includes(k)?'active':''}" data-day="${k}" onclick="this.classList.toggle('active')">${l}</button>`
 ).join('');

 const methods = [['pomodoro',' Pomodoro'],['blocos',' Blocos'],['livre',' Livre']];
 document.getElementById('settingsMethod').innerHTML = methods.map(([v,l]) =>
 `<label class="method-option ${user.metodo===v?'active-option':''}">
 <input type="radio" name="metodo_cfg" value="${v}" ${user.metodo===v?'checked':''} onchange="document.querySelectorAll('.method-option').forEach(o=>o.classList.remove('active-option'));this.closest('.method-option').classList.add('active-option')"/>
 <span>${l}</span>
 </label>`
 ).join('');
 }

 function selectHours(h, el) {
 document.querySelectorAll('#settingsHours .hours-btn').forEach(b =>b.classList.remove('active'));
 el.classList.add('active');
 }

 function saveSettings() {
 const user = getUser();
 const horasEl = document.querySelector('#settingsHours .hours-btn.active');
 const diasEls = document.querySelectorAll('#settingsDays .day-btn.active');
 const metodoEl = document.querySelector('input[name="metodo_cfg"]:checked');
 if (horasEl) user.horas = parseInt(horasEl.dataset.hours);
 user.dias = [...diasEls].map(b =>b.dataset.day);
 if (metodoEl) user.metodo = metodoEl.value;
 saveUser(user);
 showToast('Configurações salvas!');
 }

 function renderAccount(user) {
 document.getElementById('accountName').value = user.nome || '';
 document.getElementById('accountEmail').value = user.email || '';
 }

 function renderPlanLocks(user) {
 if (isPremiumUser(user)) return;
 const input = document.getElementById('avatarInput');
 input.disabled = true;
 input.closest('.form-group').insertAdjacentHTML('beforeend', `
 <div class="upgrade-card compact">
 <strong>Foto de perfil no Premium</strong>
 <p>No plano gratuito a foto de perfil fica bloqueada. Atualize para liberar personalizacao do perfil.</p>
 </div>
 `);
 }

 async function saveAvatar() {
 if (!isPremiumUser()) {
 showToast('Foto de perfil e exclusiva do plano Premium.');
 return;
 }
 const input = document.getElementById('avatarInput');
 if (!input.files.length) {
  showToast('Escolha uma imagem primeiro.');
  return;
 }
 const file = input.files[0];
 if (file.size > 2 * 1024 * 1024) {
  showToast('Imagem muito grande. Máximo: 2 MB.');
  return;
 }
 if (!file.type.startsWith('image/')) {
  showToast('Selecione apenas arquivos de imagem.');
  return;
 }
 try {
 const user = await uploadAvatar(file);
 showToast('Foto de perfil atualizada.');
 const avatar = document.querySelector('.profile-avatar-big');
 avatar.classList.add('has-avatar');
 avatar.innerHTML = `<img src="${userAvatarUrl(user)}" alt="Foto de perfil" />`;
 input.value = '';
 } catch (error) {
 showToast(error.message);
 }
 }

 async function saveAccountDetails() {
 const payload = {
 nome: document.getElementById('accountName').value.trim(),
 email: document.getElementById('accountEmail').value.trim(),
 currentPassword: document.getElementById('currentPassword').value,
 newPassword: document.getElementById('newPassword').value
 };

 if (!payload.nome || !payload.email) {
 showToast('Preencha nome e e-mail.');
 return;
 }

 try {
 const user = await updateAccount(payload);
 showToast('Detalhes da conta salvos.');
 document.getElementById('currentPassword').value = '';
 document.getElementById('newPassword').value = '';
 document.querySelector('.profile-hero-info h2').textContent = user.nome;
 document.querySelector('.profile-email').textContent = user.email;
 } catch (error) {
 showToast(error.message);
 }
 }

 function getLevelName(n) {
 const names = ['','Iniciante','Dedicado','Focado','Avançado','Expert','Mestre','Lenda'];
 return names[Math.min(n, names.length-1)] || 'Lenda';
 }

 function formatDate(dateStr) {
 const d = new Date(dateStr + 'T12:00:00');
 return d.toLocaleDateString('pt-BR', { day:'2-digit', month:'short', year:'numeric' });
 }

 function showTab(id, btn) {
 const next = document.getElementById('tab-' + id);
 const current = document.querySelector('.tab-content.tab-visible');
 if (current === next) return;
 document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
 btn.classList.add('active');
 if (current) {
  current.classList.remove('tab-visible');
  setTimeout(() => { current.style.display = 'none'; }, 220);
 }
 next.style.display = 'block';
 requestAnimationFrame(() => requestAnimationFrame(() => next.classList.add('tab-visible')));
 }
 </script>
